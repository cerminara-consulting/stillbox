name: StillBox
options:
  bundleIdPrefix: com.cerminara
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: "minimal"
    DEVELOPMENT_TEAM: "" # Set in App Store Connect; Xcode will prompt.
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: "NO"
    CODE_SIGN_STYLE: "Automatic"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    ENABLE_PREVIEWS: "YES"

targets:
  StillBox:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Views
      - path: App/Engine
      - path: App/Models
      - path: App/Store
      - path: App/Assets.xcassets
      - path: App/PreviewContent
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: StillBox
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: BrandBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cerminara.stillbox
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        DEVELOPMENT_ASSET_PATHS:
          - "App/PreviewContent"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIStatusBarHidden: "YES"
    entitlements:
      path: App/Resources/StillBox.entitlements
      properties: {}
    dependencies: []
